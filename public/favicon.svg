<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#080808"/>
  
  <!-- Subtle Border -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="11.5" stroke="#D4A853" stroke-opacity="0.2"/>
  
  <!-- "L" Initial -->
  <text 
    x="50%" 
    y="55%" 
    dominant-baseline="middle" 
    text-anchor="middle" 
    fill="url(#goldGradient)" 
    font-family="'Playfair Display', serif" 
    font-size="38" 
    font-weight="bold"
  >L</text>
  
  <!-- Gold Gradient -->
  <defs>
    <linearGradient id="goldGradient" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D4A853"/>
      <stop offset="0.5" stop-color="#E8C472"/>
      <stop offset="1" stop-color="#B8922E"/>
    </linearGradient>
  </defs>
</svg>
